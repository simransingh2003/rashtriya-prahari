  <path d="M 190 210 Q 240 170 340 190 Q 440 210 490 180 Q 470 240 340 220 Q 210 200 190 210 Z" fill="#FF6914" opacity="0.95"/>
  <path d="M 200 200 Q 250 158 340 178 Q 440 198 495 168" fill="none" stroke="#FF6914" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- White ribbon -->
  <path d="M 165 270 Q 230 240 340 255 Q 460 270 510 245 Q 500 300 340 285 Q 200 270 165 270 Z" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>

