  </defs>

  <!-- Background -->
  <circle cx="340" cy="340" r="320" fill="url(#bgGrad)" stroke="#f97316" stroke-width="3"/>
  <circle cx="340" cy="340" r="308" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

