      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#fff3e6"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c2410c" flood-opacity="0.18"/>
    </filter>
    <filter id="chakraShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1d4ed8" flood-opacity="0.25"/>
